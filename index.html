<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz QCM</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #ffe3f1, #ffd1e8, #fff5fa);
      color: #3a1f2d;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      box-shadow: 0 20px 45px rgba(168, 55, 115, 0.25);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .header {
      background: linear-gradient(135deg, #ff7fbd, #ff4fa3);
      color: white;
      padding: 28px 22px 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 0.95rem;
      opacity: 0.95;
      line-height: 1.4;
    }

    .content {
      padding: 24px 20px 26px;
    }

    .progress-wrap {
      margin-bottom: 22px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #8c4d6e;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .progress-bar {
      height: 10px;
      background: #ffe0ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff7fbd, #ff3f9d);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .question-card {
      background: #fff7fb;
      border: 1px solid #ffd0e7;
      border-radius: 24px;
      padding: 22px 18px;
      margin-bottom: 20px;
    }

    .question-number {
      color: #d63384;
      font-size: 0.9rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .question-text {
      font-size: 1.25rem;
      line-height: 1.35;
      font-weight: 750;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid #ffd0e7;
      background: white;
      color: #3a1f2d;
      padding: 16px 15px;
      border-radius: 18px;
      font-size: 1rem;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .answer-btn:active {
      transform: scale(0.98);
    }

    .answer-btn:hover {
      border-color: #ff7fbd;
      background: #fff4fa;
    }

    .answer-letter {
      min-width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ffe0ef;
      color: #c21870;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .answer-btn.correct {
      border-color: #ec4899;
      background: #ffe6f3;
    }

    .answer-btn.wrong {
      border-color: #c9a2b8;
      background: #f7edf3;
      opacity: 0.75;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      padding: 15px;
      border-radius: 18px;
      background: #ffe6f3;
      color: #7a2755;
      font-weight: 650;
      line-height: 1.4;
      border: 1px solid #ffc0df;
    }

    .feedback.show {
      display: block;
    }

    .next-btn,
    .restart-btn {
      width: 100%;
      margin-top: 18px;
      border: none;
      background: linear-gradient(135deg, #ff69b4, #e83e8c);
      color: white;
      padding: 16px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(232, 62, 140, 0.28);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .next-btn:active,
    .restart-btn:active {
      transform: scale(0.98);
    }

    .next-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result-screen {
      display: none;
      text-align: center;
      padding: 10px 0 4px;
    }

    .result-screen.show {
      display: block;
    }

    .quiz-screen.hide {
      display: none;
    }

    .score-circle {
      width: 150px;
      height: 150px;
      margin: 8px auto 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff85c2, #ff4fa3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.2rem;
      font-weight: 900;
      box-shadow: 0 16px 30px rgba(232, 62, 140, 0.28);
    }

    .result-screen h2 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: #b91c67;
    }

    .result-screen p {
      color: #6f3a55;
      line-height: 1.5;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    @media (max-width: 380px) {
      .header h1 {
        font-size: 1.55rem;
      }

      .question-text {
        font-size: 1.12rem;
      }

      .content {
        padding: 20px 16px 22px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="header">
      <h1>Quiz amusant</h1>
      <p>Choisis la meilleure réponse pour chaque situation.</p>
    </section>

    <section class="content">
      <div id="quizScreen" class="quiz-screen">
        <div class="progress-wrap">
          <div class="progress-text">
            <span id="progressLabel">Question 1</span>
            <span id="scoreLabel">Score : 0</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div class="question-card">
          <div id="questionNumber" class="question-number">Question 1</div>
          <div id="questionText" class="question-text">Question 1...</div>
        </div>

        <div id="answers" class="answers"></div>

        <div id="feedback" class="feedback"></div>

        <button id="nextBtn" class="next-btn" disabled>Question suivante</button>
      </div>

      <div id="resultScreen" class="result-screen">
        <div id="finalScore" class="score-circle">0/0</div>
        <h2>Résultat final</h2>
        <p id="resultText">Texte de résultat...</p>
        <button id="restartBtn" class="restart-btn">Recommencer</button>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        question: "Question 1...",
        answers: [
          "Réponse A...",
          "Réponse B...",
          "Réponse C...",
          "Réponse D..."
        ],
        correct: 0,
        feedback: "Explication de la bonne réponse 1..."
      },
      {
        question: "Question 2...",
        answers: [
          "Réponse A...",
          "Réponse B...",
          "Réponse C...",
          "Réponse D..."
        ],
        correct: 1,
        feedback: "Explication de la bonne réponse 2..."
      },
      {
        question: "Question 3...",
        answers: [
          "Réponse A...",
          "Réponse B...",
          "Réponse C...",
          "Réponse D..."
        ],
        correct: 2,
        feedback: "Explication de la bonne réponse 3..."
      },
      {
        question: "Question 4...",
        answers: [
          "Réponse A...",
          "Réponse B...",
          "Réponse C...",
          "Réponse D..."
        ],
        correct: 3,
        feedback: "Explication de la bonne réponse 4..."
      },
      {
        question: "Question 5...",
        answers: [
          "Réponse A...",
          "Réponse B...",
          "Réponse C...",
          "Réponse D..."
        ],
        correct: 0,
        feedback: "Explication de la bonne réponse 5..."
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let hasAnswered = false;

    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const progressLabel = document.getElementById("progressLabel");
    const scoreLabel = document.getElementById("scoreLabel");
    const progressFill = document.getElementById("progressFill");
    const questionNumber = document.getElementById("questionNumber");
    const questionText = document.getElementById("questionText");
    const answersContainer = document.getElementById("answers");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const finalScore = document.getElementById("finalScore");
    const resultText = document.getElementById("resultText");
    const restartBtn = document.getElementById("restartBtn");

    function loadQuestion() {
      const question = questions[currentQuestion];
      hasAnswered = false;

      progressLabel.textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
      scoreLabel.textContent = `Score : ${score}`;
      progressFill.style.width = `${(currentQuestion / questions.length) * 100}%`;

      questionNumber.textContent = `Question ${currentQuestion + 1}`;
      questionText.textContent = question.question;

      answersContainer.innerHTML = "";
      feedback.textContent = "";
      feedback.classList.remove("show");
      nextBtn.disabled = true;

      question.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.className = "answer-btn";
        button.innerHTML = `
          <span class="answer-letter">${String.fromCharCode(65 + index)}</span>
          <span>${answer}</span>
        `;
        button.addEventListener("click", () => selectAnswer(button, index));
        answersContainer.appendChild(button);
      });
    }

    function selectAnswer(button, selectedIndex) {
      if (hasAnswered) return;

      hasAnswered = true;
      const question = questions[currentQuestion];
      const answerButtons = document.querySelectorAll(".answer-btn");

      answerButtons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === question.correct) {
          btn.classList.add("correct");
        }
      });

      if (selectedIndex === question.correct) {
        score++;
        scoreLabel.textContent = `Score : ${score}`;
      } else {
        button.classList.add("wrong");
      }

      feedback.textContent = question.feedback;
      feedback.classList.add("show");
      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestion++;

      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizScreen.classList.add("hide");
      resultScreen.classList.add("show");
      progressFill.style.width = "100%";

      finalScore.textContent = `${score}/${questions.length}`;
      resultText.textContent = "Texte de résultat final...";
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      quizScreen.classList.remove("hide");
      resultScreen.classList.remove("show");
      loadQuestion();
    }

    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartQuiz);

    loadQuestion();
  </script>
</body>
</html>

        // Animation on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {

                    entry.target.style.transform = 'translateY(0)';
                }
            });
